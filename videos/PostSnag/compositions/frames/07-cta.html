<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata only; the runtime clones ONLY <template> contents -->
    <title>07-cta</title>
  </head>
  <body>
    <template>
      <style>
        @font-face{font-family:"Mona Sans";font-weight:400;font-style:normal;font-display:block;src:url("assets/fonts/MonaSans-Regular.woff") format("woff");}
        @font-face{font-family:"Mona Sans";font-weight:400;font-style:normal;font-display:block;src:url("assets/fonts/MonaSans-Regular.woff2") format("woff2");}

        /* Root: styled by #root only (a class here would be scoped out — see hyperframes-core Pitfall 3) */
        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "Mona Sans", sans-serif;
        }

        .clip { position: absolute; inset: 0; }

        /* ---- background ground (full-bleed, own clip layer, never on #root) ---- */
        .f7-bg {
          background: #FFFFFF;
        }

        /* ---- closing atmosphere: faint concentric rings (frame.md Closing/CTA treatment) ---- */
        .f7-ring {
          position: absolute;
          left: 960px;
          top: 540px;
          border-radius: 50%;
          border: 1px solid rgba(35, 57, 135, 0.07);
        }
        .f7-ring--1 { width: 680px; height: 680px; margin-left: -340px; margin-top: -340px; }
        .f7-ring--2 { width: 520px; height: 520px; margin-left: -260px; margin-top: -260px; }
        .f7-ring--3 { width: 340px; height: 340px; margin-left: -170px; margin-top: -170px; }

        /* ---- hero / CTA swap stage (scale-swap-transition) ----
           Both elements are centered independently on the SAME point (960, 540)
           via margin-based centering (never CSS `transform` — GSAP owns transform
           on both), so scaling around transform-origin: 50% 50% reads as one
           element morphing in place, even though their box sizes differ. */
        .f7-lockup {
          position: absolute;
          left: 50%;
          top: 540px;
          width: 560px;
          height: 170px;
          margin-left: -280px;
          margin-top: -85px;
          display: flex;
          align-items: center;
          justify-content: center;
          transform-origin: 50% 50%;
          will-change: transform, opacity;
        }
        .f7-lockup img {
          height: 132px;
          width: auto;
          display: block;
        }
        .f7-button {
          position: absolute;
          left: 50%;
          top: 540px;
          width: 720px;
          height: 120px;
          margin-left: -360px;
          margin-top: -60px;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 18px;
          background: #233987;
          border-radius: 100px;
          padding: 0 56px;
          transform-origin: 50% 50%;
          will-change: transform, opacity;
          opacity: 0;
        }
        .f7-btn-icon {
          width: 40px;
          height: 40px;
          overflow: hidden;
          flex: none;
        }
        .f7-btn-icon img {
          height: 40px;
          width: auto;
          display: block;
        }
        .f7-btn-label {
          color: #FFFFFF;
          font-family: "Mona Sans", sans-serif;
          font-weight: 600;
          font-size: 42px;
          letter-spacing: -0.01em;
          white-space: nowrap;
        }

        /* ---- ambient glow bloom behind the button (un-triggered id below is misleading name; it's release-timed here) ---- */
        .f7-glow {
          position: absolute;
          left: 50%;
          top: 540px;
          width: 760px;
          height: 320px;
          margin-left: -380px;
          margin-top: -160px;
          border-radius: 50%;
          background: radial-gradient(closest-side, rgba(11, 35, 90, 0.55), rgba(11, 35, 90, 0));
          opacity: 0;
          pointer-events: none;
          will-change: transform, opacity;
        }

        /* ---- cursor (physics-press-reaction / cursor-click-ripple) ---- */
        .f7-cursor {
          position: absolute;
          left: 0;
          top: 0;
          width: 72px;
          height: 72px;
          opacity: 0;
          pointer-events: none;
          transform-origin: 0 0;
          will-change: transform, opacity;
          filter: drop-shadow(0 4px 10px rgba(10, 10, 10, 0.25));
        }

        /* ---- click ripple rings ---- */
        .f7-ripple {
          position: absolute;
          left: 960px;
          top: 540px;
          width: 110px;
          height: 110px;
          margin-left: -55px;
          margin-top: -55px;
          border-radius: 50%;
          border: 2px solid #233987;
          opacity: 0;
          pointer-events: none;
          will-change: transform, opacity;
        }

        /* ---- URL sign-off, settles under the button ---- */
        .f7-url {
          position: absolute;
          left: 50%;
          top: 656px;
          width: 400px;
          margin-left: -200px;
          text-align: center;
          opacity: 0;
          color: #0A1535;
          font-family: "Mona Sans", sans-serif;
          font-weight: 500;
          font-size: 27px;
          letter-spacing: 0.02em;
          will-change: transform, opacity;
        }
      </style>

      <div
        id="root"
        data-composition-id="07-cta" data-start="0"
        data-width="1920"
        data-height="1080"
        data-duration="4.117"
      >
        <div class="clip f7-bg" data-start="0" data-duration="4.117" data-track-index="0"></div>

        <div class="clip" data-start="0" data-duration="4.117" data-track-index="1">
          <div class="f7-ring f7-ring--1"></div>
          <div class="f7-ring f7-ring--2"></div>
          <div class="f7-ring f7-ring--3"></div>

          <div class="f7-lockup" id="f7-lockup">
            <img src="assets/logo-cf8f6ce7.svg" alt="" />
          </div>
          <div class="f7-button" id="f7-button">
            <div class="f7-btn-icon"><img src="assets/logo-cf8f6ce7.svg" alt="" /></div>
            <div class="f7-btn-label">Add to Chrome — Free</div>
          </div>

          <div class="f7-glow" id="f7-glow"></div>

          <div class="f7-url" id="f7-url">postsnag.com</div>

          <div class="f7-ripple" id="f7-ripple-1"></div>
          <div class="f7-ripple" id="f7-ripple-2"></div>
          <div class="f7-ripple" id="f7-ripple-3"></div>

          <svg class="f7-cursor" id="f7-cursor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M3 2 L21 12 L12 13 L7 22 Z"
              fill="#233987"
              stroke="#FFFFFF"
              stroke-width="1.5"
            />
          </svg>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Cursor starts off-stage (upper-right, above the caption keep-out line)
        // and fully transparent (hard-cut in at the top of Scene 3).
        gsap.set("#f7-cursor", { x: 2120, y: 640, opacity: 0 });

        // ---------- Scene 1 (0.0-1.0s) — presence ----------
        // Lockup settles in, then a faint rotation-only resting breath
        // (sine-wave-loop, low-amplitude, finite repeat — never repeat:-1).
        tl.fromTo(
          "#f7-lockup",
          { opacity: 0, scale: 0.97 },
          { opacity: 1, scale: 1, duration: 0.3, ease: "power2.out" },
          0
        );
        tl.to(
          "#f7-lockup",
          { rotation: 0.7, duration: 0.325, ease: "sine.inOut", yoyo: true, repeat: 1 },
          0.35
        );

        // ---------- Scene 2 (1.0-1.8s) — the morph (signature move) ----------
        // scale-swap-transition: outgoing lockup shrink-fades while the incoming
        // CTA button scale-pops in, sharing one transform-origin (50% 50%).
        const MORPH_TRIGGER = 1.0;
        const EXIT_DUR = 0.35;
        const ENTER_DUR = 0.55;
        const OVERLAP = 0.15;

        tl.to(
          "#f7-lockup",
          { scale: 0.7, opacity: 0, duration: EXIT_DUR, ease: "power2.in" },
          MORPH_TRIGGER
        );
        tl.fromTo(
          "#f7-button",
          { scale: 0.7, opacity: 0 },
          { scale: 1, opacity: 1, duration: ENTER_DUR, ease: "back.out(1.6)" },
          MORPH_TRIGGER + EXIT_DUR - OVERLAP
        );

        // ---------- Scene 3 (1.8-2.8s) — approach ----------
        // Cursor hard-cuts opaque, then arrives on a decelerating path,
        // landing a little off the button's geometric center (human-aimed).
        const APPROACH_START = 1.8;
        const APPROACH_DUR = 0.85;
        const CURSOR_TARGET_X = 1000;
        const CURSOR_TARGET_Y = 565;

        tl.set("#f7-cursor", { opacity: 1 }, APPROACH_START);
        tl.to(
          "#f7-cursor",
          { x: CURSOR_TARGET_X, y: CURSOR_TARGET_Y, duration: APPROACH_DUR, ease: "power2.out" },
          APPROACH_START
        );

        // ---------- Scene 4 (2.8-4.117s) — press ----------
        // physics-press-reaction: cursor + button compress together in lockstep,
        // then release with overshoot; cursor-click-ripple + ambient-glow-bloom
        // fire on release; the URL settles beneath.
        const PRESS_DOWN_AT = 2.8;
        const PRESS_DOWN_DUR = 0.15;
        const PRESS_SCALE = 0.9;
        const RELEASE_AT = 3.0;
        const RELEASE_DUR = 0.55;

        tl.to(
          ["#f7-button", "#f7-cursor"],
          { scale: PRESS_SCALE, duration: PRESS_DOWN_DUR, ease: "power1.in" },
          PRESS_DOWN_AT
        );
        tl.to(
          ["#f7-button", "#f7-cursor"],
          { scale: 1, duration: RELEASE_DUR, ease: "back.out(1.8)" },
          RELEASE_AT
        );

        // Ripple rings burst from the click point on release.
        const RIPPLE_AT = RELEASE_AT;
        const RIPPLE_DUR = 0.7;
        const RIPPLE_SCALE = 4;
        const RIPPLE_STAGGER = 0.08;

        tl.fromTo(
          ["#f7-ripple-1", "#f7-ripple-2", "#f7-ripple-3"],
          { scale: 0, opacity: 0.6 },
          {
            scale: RIPPLE_SCALE,
            opacity: 0,
            duration: RIPPLE_DUR,
            ease: "power2.out",
            stagger: RIPPLE_STAGGER,
          },
          RIPPLE_AT
        );

        // Soft cobalt glow bloom behind the button, released state (bloom-and-hold,
        // no breathe — the remaining hold is short, per the rule's own guidance).
        tl.fromTo(
          "#f7-glow",
          { opacity: 0, scale: 0.85 },
          { opacity: 0.32, scale: 1, duration: 0.5, ease: "power2.out" },
          RELEASE_AT
        );

        // URL sign-off settles beneath the button just after release.
        tl.fromTo(
          "#f7-url",
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
          RELEASE_AT + 0.1
        );

        window.__timelines["07-cta"] = tl;
      </script>
    </template>
  </body>
</html>
