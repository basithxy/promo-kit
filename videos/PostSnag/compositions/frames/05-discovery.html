      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });

          const TOTAL_DURATION = 7.211;

          // ---- Multi-phase camera: tight open -> pull back to reveal grid ----
          const camera = document.getElementById("disc5-camera");
          const phase = { scale: 1.28 };

          tl.to(
            phase,
            { scale: 1.0, duration: 1.6, ease: "power2.inOut" },
            1.7,
          );

          const drift = { p: 0 };
          tl.to(
            drift,
            {
              p: Math.PI * 2 * 2,
              duration: TOTAL_DURATION,
              ease: "none",
              onUpdate: () => {
                const dx = Math.sin(drift.p) * 5;
                const dy = Math.sin(drift.p * 1.3) * 3;
                camera.style.transform = `scale(${phase.scale}) translate(${dx}px, ${dy}px)`;
              },
            },
            0,
          );

          // ---- Scene 1 (0.0-1.7s): icon cluster pops in ----
          tl.fromTo(
            "#disc5-icon-cluster",
            { scale: 0, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.4, ease: "power3.out" },
            0,
          );

          // ---- Scene 2 (1.7-4.7s): icons shrink upward, grid cards assemble ----
          tl.to(
            "#disc5-icon-cluster",
            { scale: 0.42, y: -300, duration: 0.9, ease: "power3.out" },
            1.7,
          );

          const cards = gsap.utils.toArray(".disc5-post-card");
          const CARD_STAGGER = 0.08;
          const CARD_ENTRY_AT = 1.9;
          cards.forEach((el, i) => {
            tl.fromTo(
              el,
              { opacity: 0, scale: 0.85, y: 40 },
              { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: "power3.out" },
              CARD_ENTRY_AT + i * CARD_STAGGER,
            );
          });

          // Center card (index 1) scales forward once the grid has landed.
          tl.to(
            "#disc5-card-1",
            { scale: 1.05, duration: 0.35, ease: "power3.out" },
            2.5,
          );

          // "Top 1%" badge spring-pops after the center card lands forward.
          tl.fromTo(
            "#disc5-badge",
            { scale: 0, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.4, ease: "power3.out" },
            2.85,
          );

          // ---- Scene 3 (4.7-7.211s): gentle parallax float + one glow sweep ----
          const floatPhase = { p: 0 };
          const N = cards.length;
          const ampScale = 1 / Math.sqrt(N); // concurrent-elements amplitude discipline
          tl.to(
            floatPhase,
            {
              p: Math.PI * 2,
              duration: TOTAL_DURATION - 4.7,
              ease: "none",
              onUpdate: () => {
                cards.forEach((el, i) => {
                  const offset = (i * Math.PI) / 6;
                  const bob = Math.sin(floatPhase.p + offset) * 3 * ampScale;
                  gsap.set(el, { y: bob });
                });
              },
            },
            4.7,
          );

          // Single-pass glow sweep across the assembled grid row.
          tl.fromTo(
            "#disc5-glow-band",
            { x: -400, opacity: 0 },
            { x: 1960, opacity: 0.28, duration: 0.8, ease: "none" },
            4.9,
          );
          tl.to(
            "#disc5-glow-band",
            { opacity: 0, duration: 0.4, ease: "power1.in" },
            5.7,
          );

          window.__timelines["05-discovery"] = tl;
        })();
      </script>
