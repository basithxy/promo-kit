<script>
  (async () => {
    const TOTAL_DURATION = 4.907;
    const W = 1920;
    const H = 1080;

    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // ---------- window entrance ----------
    tl.fromTo(
      "#f03pm-window",
      { scale: 0.92, opacity: 0 },
      { scale: 1, opacity: 1, duration: 0.5, ease: "power3.out" },
      0,
    );

    // ---------- discrete-text-sequence: smooth character slice ----------
    const FULL_TEXT = "Senior Product Designer — Acme Co. 5+ yrs exp.";
    const TYPE_START = 0.75;
    const TYPE_DUR = 1.15;
    const textEl = document.getElementById("f03pm-typed-text");
    const len = { v: 0 };
    tl.to(
      len,
      {
        v: FULL_TEXT.length,
        duration: TYPE_DUR,
        ease: "none",
        onUpdate: () => {
          textEl.textContent = FULL_TEXT.substring(0, Math.floor(len.v));
        },
      },
      TYPE_START,
    );

    // cursor blink — deterministic sin square wave
    const cursorEl = document.getElementById("f03pm-cursor");
    const BLINK_START = TYPE_START;
    const BLINK_END = 2.1;
    const BLINK_DUR = BLINK_END - BLINK_START;
    const blink = { p: 0 };
    tl.to(
      blink,
      {
        p: Math.PI * 2 * (BLINK_DUR / 0.55),
        duration: BLINK_DUR,
        ease: "none",
        onUpdate: () => {
          cursorEl.style.opacity = Math.sin(blink.p) > 0 ? "1" : "0";
        },
      },
      BLINK_START,
    );
    tl.set(cursorEl, { opacity: 0 }, BLINK_END);

    // ---------- submit click pulse ----------
    tl.to(
      "#f03pm-submit-btn",
      { scale: 0.94, duration: 0.08, yoyo: true, repeat: 1, ease: "power1.inOut" },
      2.1,
    );

    // ---------- input -> status crossfade ----------
    tl.to("#f03pm-input-phase", { opacity: 0, scale: 0.96, duration: 0.18, ease: "power1.in" }, 2.12);
    tl.fromTo(
      "#f03pm-status-phase",
      { opacity: 0, scale: 0.96 },
      { opacity: 1, scale: 1, duration: 0.22, ease: "power2.out" },
      2.15,
    );

    // ---------- shimmer sweep (status working-state, bounded, killed at resolve) ----------
    const statusEl = document.getElementById("f03pm-status-text");
    const STATUS_START = 2.18;
    const STATUS_DUR = 0.32;
    const shimmer = { p: 0 };
    tl.to(
      shimmer,
      {
        p: 1,
        duration: STATUS_DUR,
        ease: "none",
        onUpdate: () => {
          const t = shimmer.p % 1;
          statusEl.style.backgroundPosition = `${(1 - t) * 100}% 50%`;
        },
      },
      STATUS_START,
    );
    tl.set(statusEl, { backgroundPosition: "100% 50%" }, STATUS_START + STATUS_DUR);
    tl.fromTo(
      "#f03pm-status-check",
      { opacity: 0, scale: 0 },
      { opacity: 1, scale: 1, duration: 0.2, ease: "power3.out" },
      STATUS_START + STATUS_DUR,
    );

    // ---------- window recedes as the answer arrives ----------
    tl.to("#f03pm-window", { opacity: 0, scale: 0.94, duration: 0.3, ease: "power2.in" }, 2.5);

    // ---------- spring-pop-entrance: resume card, then cover-letter card ----------
    const POP_DUR = 0.5;
    tl.fromTo(
      "#f03pm-resume-card",
      { scale: 0, opacity: 0 },
      { scale: 1, opacity: 1, duration: POP_DUR, ease: "power3.out" },
      2.5,
    );
    tl.fromTo(
      "#f03pm-cover-card",
      { scale: 0, opacity: 0 },
      { scale: 1, opacity: 1, duration: POP_DUR, ease: "power3.out" },
      2.95,
    );

    // resume lines filling in
    const resumeLines = ["#f03pm-r-line-1", "#f03pm-r-line-2", "#f03pm-r-line-3", "#f03pm-r-line-4", "#f03pm-r-line-5"];
    resumeLines.forEach((sel, i) => {
      tl.fromTo(
        sel,
        { x: -14, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.3, ease: "power2.out" },
        2.85 + i * 0.08,
      );
    });

    // cover-letter lines filling in
    const coverLines = ["#f03pm-c-line-1", "#f03pm-c-line-2", "#f03pm-c-line-3", "#f03pm-c-line-4"];
    coverLines.forEach((sel, i) => {
      tl.fromTo(
        sel,
        { x: -14, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.3, ease: "power2.out" },
        3.35 + i * 0.08,
      );
    });
    tl.fromTo(
      "#f03pm-c-sign",
      { opacity: 0 },
      { opacity: 1, duration: 0.3, ease: "power2.out" },
      3.35 + coverLines.length * 0.08 + 0.05,
    );

    // ---------- ambient-glow-bloom: bloom-and-hold behind the completed cards ----------
    tl.fromTo(
      "#f03pm-glow",
      { opacity: 0, scale: 0.86 },
      { opacity: 0.3, scale: 1, duration: 0.35, ease: "power2.out" },
      4.05,
    );

    // ---------- coordinate-target-zoom: measure the paste-input target, bake offset ----------
    await document.fonts.ready;
    const targetEl = document.querySelector("#f03pm-window .f03pm-paste-input");
    const r = targetEl.getBoundingClientRect();
    const offsetX = r.left + r.width / 2 - W / 2;
    const offsetY = r.top + r.height / 2 - H / 2;
    const ZOOM_SCALE = 1.7;
    const counterX = -offsetX;
    const counterY = -offsetY;

    const camOuter = "#f03pm-cam-outer";
    const camInner = "#f03pm-cam-inner";

    // multi-phase-camera: push-in landing tight on the input (matches Scene 1's settle)
    tl.to(camOuter, { scale: ZOOM_SCALE, duration: 0.55, ease: "power3.inOut" }, 0.15);
    tl.to(camInner, { x: counterX, y: counterY, duration: 0.55, ease: "power3.inOut" }, 0.15);

    // pull back to reveal the full two-up layout before the answer cards land
    tl.to(camOuter, { scale: 1, duration: 0.35, ease: "power2.inOut" }, 2.15);
    tl.to(camInner, { x: 0, y: 0, duration: 0.35, ease: "power2.inOut" }, 2.15);

    // continuous organic micro-drift — the single writer of the drift layer's transform
    const driftEl = document.getElementById("f03pm-cam-drift");
    const drift = { p: 0 };
    tl.to(
      drift,
      {
        p: Math.PI * 2 * 1.6,
        duration: TOTAL_DURATION,
        ease: "none",
        onUpdate: () => {
          const dx = Math.sin(drift.p) * 4;
          const dy = Math.sin(drift.p * 1.3) * 2.5;
          driftEl.style.transform = `translate(${dx}px, ${dy}px)`;
        },
      },
      0,
    );

    window.__timelines["03-paste-and-match"] = tl;
  })();
</script>
