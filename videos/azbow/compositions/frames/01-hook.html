<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Poppins";
          src: url("assets/fonts/pxiEyp8kv8JHgFVrJJfedw.ttf") format("truetype");
          font-weight: 700;
          font-style: normal;
        }

        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          container-type: size;
          container-name: hook;
        }

        .hook1-bg {
          position: absolute;
          inset: 0;
          background: #ffffff;
        }

        .hook1-stage {
          position: absolute;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 0 6cqw 10cqh 6cqw;
        }

        #hook1-line1,
        #hook1-line2 {
          position: absolute;
          left: 0;
          right: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 0 6cqw;
        }

        #hook1-line2 {
          opacity: 0;
          visibility: hidden;
        }

        .hook1-line-text {
          font-family: "Poppins", sans-serif;
          font-weight: 700;
          font-size: 9cqw;
          line-height: 1.1;
          letter-spacing: 0.005em;
          text-transform: uppercase;
          color: #777777;
          text-align: center;
          max-width: 78cqw;
          will-change: transform;
        }

        .hook1-word-wrap {
          position: relative;
          display: inline-block;
        }

        .hook1-underline {
          position: absolute;
          left: 0;
          right: 0;
          bottom: -0.1em;
          height: 0.09em;
          background: #171940;
          border-radius: 4px;
          transform: scaleX(0);
          transform-origin: left center;
        }
      </style>

      <div id="root" data-composition-id="01-hook" data-width="1920" data-height="1080" data-duration="4.368">
        <div class="hook1-bg clip" id="hook1-bg" data-start="0" data-duration="4.368" data-track-index="0"></div>

        <div class="hook1-stage clip" id="hook1-stage" data-start="0" data-duration="4.368" data-track-index="1">
          <div id="hook1-line1">
            <div class="hook1-line-text">Off-the-shelf</div>
          </div>
          <div id="hook1-line2">
            <div class="hook1-line-text">
              Built <span class="hook1-word-wrap">different<span class="hook1-underline" id="hook1-underline"></span></span>
            </div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};

          var tl = gsap.timeline({ paused: true });

          var line1 = document.getElementById("hook1-line1");
          var line2 = document.getElementById("hook1-line2");
          var line1Text = line1.querySelector(".hook1-line-text");
          var line2Text = line2.querySelector(".hook1-line-text");
          var underline = document.getElementById("hook1-underline");

          // --- Scene 1 (0.0-2.0s): oversized word settles centered, long-tail power3, no overshoot ---
          tl.set(line1, { autoAlpha: 1 }, 0);
          tl.set(line2, { autoAlpha: 0 }, 0);

          tl.fromTo(line1Text, { opacity: 0 }, { opacity: 1, duration: 0.35, ease: "power3.out" }, 0);
          tl.fromTo(
            line1Text,
            { scale: 1.35 },
            { scale: 1, duration: 0.9, ease: "power3.out", transformOrigin: "center center" },
            0,
          );

          // Scene 1 hold — subtle jitter only (sine-wave-loop), starts once entrance has settled
          var phase1 = { p: 0 };
          tl.to(
            phase1,
            {
              p: Math.PI * 2 * 0.5,
              duration: 1.0,
              ease: "none",
              onUpdate: function () {
                var s = 1 + Math.sin(phase1.p) * 0.01;
                var y = Math.sin(phase1.p) * 2;
                line1Text.style.transform = "translateY(" + y + "px) scale(" + s + ")";
              },
            },
            1.0,
          );

          // --- Scene 2 (2.0-3.968s): hard cut (no fade/roll), then drawn-on underline ---
          tl.set(line1, { autoAlpha: 0 }, 2.0);
          tl.set(line2, { autoAlpha: 1 }, 2.0);

          tl.fromTo(
            underline,
            { scaleX: 0 },
            { scaleX: 1, duration: 0.5, ease: "power3.out", transformOrigin: "left center" },
            2.02,
          );

          // Scene 2 hold — settle-and-hold, subtle jitter only, no continuing motion
          var phase2 = { p: 0 };
          tl.to(
            phase2,
            {
              p: Math.PI * 2 * 0.6,
              duration: 1.368,
              ease: "none",
              onUpdate: function () {
                var s = 1 + Math.sin(phase2.p) * 0.01;
                var y = Math.sin(phase2.p) * 2;
                line2Text.style.transform = "translateY(" + y + "px) scale(" + s + ")";
              },
            },
            2.6,
          );

          window.__timelines["01-hook"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
