<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata only for the source file; the runtime discards everything
         outside <template> — see hyperframes-core/references/sub-compositions.md -->
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Poppins";
          src: url("assets/fonts/pxiEyp8kv8JHgFVrJJfedw.ttf") format("truetype");
          font-weight: 700;
          font-style: normal;
        }
        @font-face {
          font-family: "Poppins";
          src: url("assets/fonts/pxiByp8kv8JHgFVrLGT9Z1xlEA.ttf") format("truetype");
          font-weight: 500;
          font-style: normal;
        }

        /* Root — style via #root only (never a class on the data-composition-id
           element: it gets scoped to a descendant selector at assembly and
           silently stops matching). */
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          container-type: size;
          --bg: #ffffff;
          --primary: #171940;
          --text: #777777;
          --text-muted: #4046b3;
          --border: rgba(23, 25, 64, 0.2);
          font-family: "Poppins", sans-serif;
        }

        /* Full-bleed ground — its own class="clip" layer, never a #root background
           (root is clip-gated per scene at assembly, so a root bg is unreliable). */
        .in2-bg {
          position: absolute;
          inset: 0;
          background: var(--bg);
        }

        /* ---- Scene 1: hook word "Introducing" + selection-box ---- */
        .in2-hookword-clip {
          position: absolute;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .in2-word-stage {
          position: relative;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          transform-origin: 50% 50%;
          will-change: transform, filter, opacity;
        }
        .in2-word-text {
          position: relative;
          z-index: 1;
          display: block;
          font-family: "Poppins", sans-serif;
          font-weight: 700;
          font-size: 4.2cqw;
          line-height: 1.08;
          letter-spacing: -0.02em;
          color: var(--text);
          white-space: nowrap;
          transform-origin: 50% 50%;
          will-change: transform, opacity;
        }
        .in2-word-select-box {
          position: absolute;
          inset: -0.9cqw -1.8cqw;
          z-index: 0;
          border: 3px solid var(--primary);
          border-radius: 18px;
          opacity: 0;
          transform: scale(0.92);
          transform-origin: 50% 50%;
          pointer-events: none;
          will-change: transform, opacity;
        }

        /* ---- Scene 1 resolve: Azbow mark ---- */
        .in2-logo-clip {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          padding-top: 270px;
        }
        .in2-logo-wrap {
          display: block;
          transform-origin: 50% 50%;
          will-change: transform, filter, opacity;
        }
        .in2-logo-img {
          display: block;
          width: 300px;
          height: auto;
        }

        /* ---- Scene 2: tagline ---- */
        .in2-tagline-clip {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          padding-top: 650px;
        }
        .in2-accent-line {
          width: 60px;
          height: 4px;
          background: var(--primary);
          border-radius: 2px;
          margin-bottom: 22px;
          transform: scaleX(0);
          transform-origin: 50% 50%;
          will-change: transform;
        }
        .in2-tagline-text {
          display: flex;
          flex-wrap: wrap;
          align-items: baseline;
          justify-content: center;
          gap: 0.4em;
          max-width: 72.9cqw;
          margin: 0;
          text-align: center;
        }
        .in2-tagline-word {
          display: inline-block;
          font-family: "Poppins", sans-serif;
          font-weight: 500;
          font-size: 1.25cqw;
          line-height: 1.3;
          letter-spacing: -0.02em;
          color: var(--text);
          opacity: 0;
          transform: translateY(16px);
          will-change: transform, opacity;
        }
      </style>

      <div
        id="root"
        data-composition-id="02-intro"
        data-width="1920"
        data-height="1080"
        data-duration="5.187"
      >
        <div id="in2-bg-clip" class="clip in2-bg" data-start="0" data-duration="5.187" data-track-index="0"></div>

        <div
          id="in2-hookword-clip"
          class="clip in2-hookword-clip"
          data-start="0"
          data-duration="1.05"
          data-track-index="1"
        >
          <div class="in2-word-stage" id="in2-word-stage">
            <span class="in2-word-select-box" id="in2-word-select-box"></span>
            <span class="in2-word-text" id="in2-word-text">Introducing</span>
          </div>
        </div>

        <div
          id="in2-logo-clip"
          class="clip in2-logo-clip"
          data-start="1.05"
          data-duration="4.137"
          data-track-index="2"
        >
          <div class="in2-logo-wrap" id="in2-logo-wrap">
            <img class="in2-logo-img" id="in2-logo-img" src="assets/azbow.png" alt="" />
          </div>
        </div>

        <div
          id="in2-tagline-clip"
          class="clip in2-tagline-clip"
          data-start="2.3"
          data-duration="2.887"
          data-track-index="3"
        >
          <div class="in2-accent-line" id="in2-accent-line"></div>
          <p class="in2-tagline-text" id="in2-tagline-text">
            <span class="in2-tagline-word" id="in2-tw-0">custom</span>
            <span class="in2-tagline-word" id="in2-tw-1">software,</span>
            <span class="in2-tagline-word" id="in2-tw-2">apps,</span>
            <span class="in2-tagline-word" id="in2-tw-3">and</span>
            <span class="in2-tagline-word" id="in2-tw-4">marketing</span>
            <span class="in2-tagline-word" id="in2-tw-5">that</span>
            <span class="in2-tagline-word" id="in2-tw-6">deliver</span>
          </p>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          var tl = gsap.timeline({ paused: true });

          // ---------------------------------------------------------------
          // Scene 1 (0.0-2.3s VO window): "Introducing" arrives with a
          // primary-accent selection-box, then hard-cuts through (Z-axis
          // zoom-through, cut-catalog) into the Azbow mark, which settles
          // with a smooth power3 spring-pop (no overshoot).
          // ---------------------------------------------------------------

          // Word + box entrance — calm settle (spring-pop-entrance, hero-wordmark
          // variant): small y-rise, no rotation, power3.out.
          tl.fromTo(
            "#in2-word-text",
            { opacity: 0, y: 14, scale: 0.97 },
            { opacity: 1, y: 0, scale: 1, duration: 0.32, ease: "power3.out" },
            0,
          );
          tl.fromTo(
            "#in2-word-select-box",
            { opacity: 0, scale: 0.92 },
            { opacity: 1, scale: 1, duration: 0.34, ease: "power3.out" },
            0.14,
          );

          // Zoom-through cut (cut-catalog.md #1): word group accelerates toward
          // the viewer, blur/opacity peak at the hard cut, logo continues the
          // same forward motion out from behind it.
          var EXIT_AT = 0.85;
          var EXIT_DUR = 0.2;
          var CUT_AT = EXIT_AT + EXIT_DUR; // 1.05 — matches the hookword clip's data-duration

          tl.to(
            "#in2-word-stage",
            { scale: 1.2, filter: "blur(10px)", duration: EXIT_DUR, ease: "power3.in" },
            EXIT_AT,
          );
          tl.to(
            "#in2-word-stage",
            { opacity: 0.15, duration: EXIT_DUR, ease: "none" },
            EXIT_AT,
          );

          // Hard cut — instant swap at peak velocity/blur.
          tl.set("#in2-word-stage", { opacity: 0 }, CUT_AT);
          tl.set(
            "#in2-logo-wrap",
            { opacity: 0.15, scale: 0.75, filter: "blur(10px)" },
            CUT_AT,
          );

          // Entry — logo continues forward into the focal plane. Ease swapped
          // from the catalog's default expo.out to power3.out per this video's
          // motion grammar (long-tail power3 only, no bounce/overshoot); this
          // is the "spring-pop-entrance settle, critically-damped" the shot calls for.
          var LOGO_ENTRY_DUR = 0.55;
          var LOGO_SETTLED_AT = CUT_AT + LOGO_ENTRY_DUR; // 1.6
          tl.to(
            "#in2-logo-wrap",
            {
              scale: 1,
              filter: "blur(0px)",
              opacity: 1,
              duration: LOGO_ENTRY_DUR,
              ease: "power3.out",
            },
            CUT_AT,
          );

          // Held mark — subtle low-amplitude jitter only (sine-wave-loop),
          // the video's sanctioned hold-aliveness. Single held hero, short
          // window (<6s) → low end of the amplitude range.
          (function () {
            var IDLE_START = LOGO_SETTLED_AT; // 1.6
            var IDLE_DUR = 4.587 - IDLE_START; // 2.987
            var CYCLES = 1.3;
            var SCALE_AMP = 0.01;
            var Y_AMP_PX = 2.5;
            var logo = document.getElementById("in2-logo-wrap");
            var phase = { p: 0 };
            tl.to(
              phase,
              {
                p: Math.PI * 2 * CYCLES,
                duration: IDLE_DUR,
                ease: "none",
                onUpdate: function () {
                  var s = 1 + Math.sin(phase.p) * SCALE_AMP;
                  var y = Math.sin(phase.p) * Y_AMP_PX;
                  logo.style.transform = "translateY(" + y + "px) scale(" + s + ")";
                },
              },
              IDLE_START,
            );
          })();

          // ---------------------------------------------------------------
          // Scene 2 (2.3-4.587s VO window): tagline reveals beneath the mark,
          // one word per VO beat, then holds.
          // ---------------------------------------------------------------

          tl.fromTo(
            "#in2-accent-line",
            { scaleX: 0 },
            { scaleX: 1, duration: 0.3, ease: "power3.out" },
            2.3,
          );

          var TAGLINE_START = 2.3;
          var WORD_STAGGER = 0.23;
          var WORD_DUR = 0.4;
          var words = gsap.utils.toArray(".in2-tagline-word");
          words.forEach(function (el, i) {
            tl.fromTo(
              el,
              { opacity: 0, y: 16 },
              { opacity: 1, y: 0, duration: WORD_DUR, ease: "power3.out" },
              TAGLINE_START + i * WORD_STAGGER,
            );
          });

          window.__timelines["02-intro"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
