<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata only; the runtime clones <template> contents, head is discarded -->
  </head>
  <body>
    <template>
      <style>
        @font-face{font-family:"Montserrat";font-weight:400;font-style:normal;font-display:block;src:url("assets/fonts/Montserrat-Regular.otf") format("opentype");}
        @font-face{font-family:"WooCommerce";font-weight:400;font-style:normal;font-display:block;src:url("assets/fonts/WooCommerce-Regular.ttf") format("truetype");}
        @font-face{font-family:"WooCommerce";font-weight:400;font-style:normal;font-display:block;src:url("assets/fonts/WooCommerce-Regular.woff") format("woff");}
        @font-face{font-family:"WooCommerce";font-weight:400;font-style:normal;font-display:block;src:url("assets/fonts/WooCommerce-Regular.woff2") format("woff2");}
        @font-face{font-family:"Open Sans";font-weight:400;font-style:normal;font-display:block;src:url("assets/fonts/OpenSans-Regular.woff2") format("woff2");}

        /* Root — styled via #root only (never a class on the data-composition-id element) */
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          container-type: size;
          font-family: "Montserrat", sans-serif;
        }

        /* ---- full-bleed ground (its own class="clip" layer, never on #root) ---- */
        .f2pi-bg {
          position: absolute;
          inset: 0;
          background: #FFFFFF;
        }
        .f2pi-glow {
          position: absolute;
          inset: 0;
          background:
            radial-gradient(46cqw 46cqw at 8% 12%, rgba(158, 174, 228, 0.14) 0%, rgba(158, 174, 228, 0) 70%),
            radial-gradient(50cqw 50cqw at 92% 88%, rgba(38, 60, 135, 0.10) 0%, rgba(38, 60, 135, 0) 70%),
            radial-gradient(40cqw 40cqw at 78% 15%, rgba(217, 156, 43, 0.08) 0%, rgba(217, 156, 43, 0) 70%);
        }
        .f2pi-grain {
          position: absolute;
          inset: 0;
          opacity: 0.04;
          mix-blend-mode: multiply;
          background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='7' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
          background-size: 160px 160px;
        }

        /* ---- product jar (cutout, right) ---- */
        .f2pi-jar-layer {
          position: absolute;
          inset: 0;
        }
        .f2pi-jar-wrap {
          position: absolute;
          right: 8cqw;
          top: 48%;
          transform: translateY(-50%);
          width: 34cqw;
          height: 34cqw;
          display: grid;
          place-items: center;
          perspective: 1400px;
        }
        .f2pi-jar-shadow {
          position: absolute;
          left: 50%;
          bottom: 4%;
          width: 62%;
          height: 14%;
          transform: translateX(-50%);
          background: radial-gradient(ellipse at center, rgba(30, 30, 30, 0.24) 0%, rgba(30, 30, 30, 0) 72%);
          filter: blur(10px);
        }
        .f2pi-jar {
          position: relative;
          width: 92%;
          height: 92%;
          object-fit: contain;
          transform-origin: 50% 55%;
          will-change: transform;
          opacity: 0;
        }

        /* ---- text column (left) ---- */
        .f2pi-text-layer {
          position: absolute;
          inset: 0;
        }
        .f2pi-textcol {
          position: absolute;
          left: 6cqw;
          top: 42%;
          transform: translateY(-50%);
          width: 40cqw;
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          gap: 1.6cqw;
        }
        .f2pi-pill {
          display: inline-flex;
          align-items: center;
          padding: 1.05cqw 2.6cqw;
          background: #9EAEE4;
          border: 0.2cqw solid #1E1E1E;
          border-radius: 9999px;
          box-shadow: 0.3cqw 0.3cqw 0 rgba(26, 26, 26, 0.08);
          font-size: 0.95cqw;
          font-weight: 600;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: #1E1E1E;
          transform-origin: 0% 50%;
          will-change: transform;
          opacity: 0;
        }
        .f2pi-headline {
          margin: 0;
          font-family: "Montserrat", sans-serif;
          font-weight: 700;
          font-size: 5cqw;
          line-height: 1.08;
          letter-spacing: -0.02em;
          color: #777777;
        }
        .f2pi-caret {
          display: inline-block;
          margin-left: 0.3cqw;
          color: #263C87;
          font-weight: 700;
        }
        .f2pi-accent {
          width: 3.2cqw;
          height: 0.22cqw;
          background: #263C87;
          border-radius: 9999px;
          transform-origin: 0% 50%;
          will-change: transform;
        }
      </style>

      <div id="root" data-composition-id="02-product-intro" data-width="1920" data-height="1080" data-duration="5.705">
        <!-- ground -->
        <div id="f2pi-bg" class="clip f2pi-bg" data-start="0" data-duration="5.705" data-track-index="0"></div>
        <div id="f2pi-glow" class="clip f2pi-glow" data-start="0" data-duration="5.705" data-track-index="1"></div>
        <div id="f2pi-grain" class="clip f2pi-grain" data-start="0" data-duration="5.705" data-track-index="2"></div>

        <!-- jar (cutout, focal) -->
        <div id="f2pi-jar-layer" class="clip f2pi-jar-layer" data-start="0" data-duration="5.705" data-track-index="3">
          <div class="f2pi-jar-wrap">
            <div class="f2pi-jar-shadow"></div>
            <img
              id="f2pi-jar"
              class="f2pi-jar"
              src="assets/broad-spectrum-protection-cream-spf-50-f.jpg"
              alt=""
            />
          </div>
        </div>

        <!-- name-drop headline + title pill + accent -->
        <div id="f2pi-text-layer" class="clip f2pi-text-layer" data-start="0" data-duration="5.705" data-track-index="4">
          <div class="f2pi-textcol">
            <div class="f2pi-pill" id="f2pi-pill">SPF 50 &middot; Broad Spectrum</div>
            <h1 class="f2pi-headline" id="f2pi-headline">
              <span id="f2pi-headline-text"></span><span class="f2pi-caret" id="f2pi-caret">|</span>
            </h1>
            <div class="f2pi-accent" id="f2pi-accent"></div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          var tl = gsap.timeline({ paused: true });

          var jar = document.getElementById("f2pi-jar");
          var pill = document.getElementById("f2pi-pill");
          var headlineText = document.getElementById("f2pi-headline-text");
          var caret = document.getElementById("f2pi-caret");
          var accent = document.getElementById("f2pi-accent");

          var FULL_TEXT = "Meet Spectrum Protect SPF 50";

          // --- Scene 1 (0.0-2.0s): jar scale+fade entrance, name-drop headline types on ---

          // Jar: scale/fade/rise entrance (fromTo so t=0 seek lands collapsed+invisible)
          tl.fromTo(
            jar,
            { scale: 0, opacity: 0, y: 24 },
            { scale: 1, opacity: 1, y: 0, duration: 0.65, ease: "power3.out" },
            0.1,
          );

          // Headline: smooth character-slice type-on
          var TYPE_START = 0.25;
          var TYPE_DUR = 1.1;
          var typeLen = { v: 0 };
          tl.to(
            typeLen,
            {
              v: FULL_TEXT.length,
              duration: TYPE_DUR,
              ease: "power1.inOut",
              onUpdate: function () {
                headlineText.textContent = FULL_TEXT.substring(0, Math.floor(typeLen.v));
              },
            },
            TYPE_START,
          );

          // Caret: deterministic sin blink while typing, then fades out
          var caretPhase = { p: 0 };
          tl.to(
            caretPhase,
            {
              p: Math.PI * 2 * 1.8,
              duration: TYPE_DUR,
              ease: "none",
              onUpdate: function () {
                caret.style.opacity = Math.sin(caretPhase.p) > 0 ? "1" : "0";
              },
            },
            TYPE_START,
          );
          tl.to(caret, { opacity: 0, duration: 0.2, ease: "power1.out" }, TYPE_START + TYPE_DUR + 0.15);

          // Jar idle turntable: continuous gentle rotationY drift, starts once the pop settles,
          // runs for the rest of the shot (composes with the entrance's scale/y via GSAP's shared
          // per-element transform cache — no raw style.transform writes, so no conflict).
          var IDLE_START = 0.85;
          var IDLE_DUR = 5.205 - IDLE_START;
          var CYCLES = 1.7; // ~2.6s per cycle, gentle
          var jarPhase = { p: 0 };
          tl.to(
            jarPhase,
            {
              p: Math.PI * 2 * CYCLES,
              duration: IDLE_DUR,
              ease: "none",
              onUpdate: function () {
                gsap.set(jar, { rotationY: Math.sin(jarPhase.p) * 8 });
              },
            },
            IDLE_START,
          );

          // --- Scene 2 (2.0-5.2s): title pill spring-pops, accent-line draws, holds to end ---

          // Title pill: playful spring pop (brand is a candy/Memphis register — modest overshoot)
          tl.fromTo(
            pill,
            { scale: 0, opacity: 0, y: 16 },
            { scale: 1, opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.4)" },
            2.15,
          );

          // Accent-line: draws in left->right as the VO lands "actually works"
          // (fromTo declares the collapsed start explicitly — no CSS-baked transform
          // on this element, so GSAP owns the whole transform from first touch)
          tl.fromTo(accent, { scaleX: 0 }, { scaleX: 1, duration: 0.45, ease: "power2.out" }, 4.2);

          window.__timelines["02-product-intro"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
