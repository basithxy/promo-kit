      <style>
        @import url('https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&display=swap');

        /* Root — styled via #root only (never a class; see hyperframes-core Pitfall 3) */
        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: 'Mulish', sans-serif;
          --bg: #FFFFFF;

        .bg-layer {
          position: absolute;
          inset: 0;
          background: var(--bg);
        }

        .stage-layer {
          position: absolute;
          inset: 0;
          overflow: hidden;

        .camera {

          inset: 0;
          transform-origin: 50% 50%;
          transform-style: preserve-3d;
          will-change: transform;

        .app-window {

        .script-tag {

          text-transform: uppercase;

          background: var(--accent-light);

        .script-txt {

          color: var(--text);

        }

        /* ---- Cursor (protagonist) ---- */
        .cursor {
          position: absolute;
          left: 510px;
          top: 334px;
          width: 28px;
          height: 28px;
          pointer-events: none;
          z-index: 999;
          transform-origin: 20% 15%;
          will-change: transform, opacity;
        }

        .cursor svg {
          display: block;
          width: 28px;

        }

        .ripple {
          position: absolute;
          left: 1268px;

          width: 90px;
          height: 90px;
          border-radius: 50%;
          border: 2.5px solid var(--primary);
          pointer-events: none;
          will-change: transform, opacity;
        }

      <div id="root" data-composition-id="03-demo-script" data-width="1920" data-height="1080">

        ></div>

        <div

          class="clip stage-layer"
          data-start="0"
          data-duration="4.651"
          data-track-index="1"
        >
          <div class="camera" id="ds3-camera">
            <div class="app-window" id="ds3-app-window">
              <div class="left-col">
                <div class="eyebrow">Find Your Idea</div>
                <div class="search-box">
                  <span class="search-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                      <circle cx="10.5" cy="10.5" r="7" stroke="#6638D9" stroke-width="2.2" />
                      <line x1="15.8" y1="15.8" x2="21" y2="21" stroke="#6638D9" stroke-width="2.2" stroke-linecap="round" />
                    </svg>

                    <span class="search-text" id="ds3-search-text"></span><span class="search-cursor" id="ds3-search-cursor"></span>

              <div class="swap-wrap">
                <div class="trending-eyebrow" id="ds3-trending-eyebrow">Trending Now</div>

                <div class="pills-col" id="ds3-pills-col">
                  <div class="pill top-pill" id="ds3-pill-0" style="top:0px;">
                    <div class="pill-label">Morning Routine</div>
                    <div class="pill-stat">
                      <span class="pill-num" id="ds3-num-0">0</span><span class="pill-suffix">K</span><span class="pill-arrow">&#9650;</span>

                  <div class="pill" id="ds3-pill-1" style="top:116px;">
                    <div class="pill-label">5AM Club</div>

                  <div class="pill" id="ds3-pill-2" style="top:232px;">
                    <div class="pill-label">Sleep Hacks</div>
                    <div class="pill-stat">
                      <span class="pill-num" id="ds3-num-2">0</span><span class="pill-suffix">K</span><span class="pill-arrow">&#9650;</span>

                  <div class="pill" id="ds3-pill-3" style="top:348px;">
                    <div class="pill-label">Cold Showers</div>
                    <div class="pill-stat">
                      <span class="pill-num" id="ds3-num-3">0</span><span class="pill-suffix">K</span><span class="pill-arrow">&#9650;</span>

                <div class="script-panel" id="ds3-script-panel">
                  <div class="script-eyebrow">Script</div>
                  <div class="script-line">

            <div class="cursor" id="ds3-cursor">
              <svg viewBox="0 0 24 24">
                <path d="M5 3L19 12L12 13L9 20L5 3Z" fill="#6638D9" stroke="#FFFFFF" stroke-width="1.5" />

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        const DURATION = 4.651;

        const camera = document.getElementById('ds3-camera');
        const appWindow = document.getElementById('ds3-app-window');
        const cursor = document.getElementById('ds3-cursor');
        const ripple = document.getElementById('ds3-ripple');
        const searchTextEl = document.getElementById('ds3-search-text');
        const searchCursorEl = document.getElementById('ds3-search-cursor');
        const trendingEyebrow = document.getElementById('ds3-trending-eyebrow');
        const pillsCol = document.getElementById('ds3-pills-col');
        const scriptPanel = document.getElementById('ds3-script-panel');
        const pillEls = [0, 1, 2, 3].map((i) => document.getElementById(`ds3-pill-${i}`));

        /* ---------------------------------------------------------------
         * Camera — single source of truth `cam` object + applyCamera(),
         * per viewport-change / multi-phase-camera contract.
         * ------------------------------------------------------------- */
        const cam = { scale: 1, x: 0, y: 0 };
        function applyCamera() {
          camera.style.transform = `translate(${cam.x}px, ${cam.y}px) scale(${cam.scale})`;
        }
        applyCamera();

        /* ---------------------------------------------------------------
         * Scene 1 (0.0 - 1.3s): surface present, 3D tilt settles toward
         * flat as the cursor arrives and types the idea.
         * ------------------------------------------------------------- */
        tl.fromTo(
          appWindow,
          { rotationY: -8, rotationX: 4, scale: 0.97 },
          { rotationY: -3, rotationX: 1.5, scale: 1, duration: 0.6, ease: 'power3.out' },
          0,
        );

        // Cursor entrance — small drop-in at the search field.
        const ENTRY_AT = 0.05;
        const ENTRY_DUR = 0.25;
        tl.fromTo(
          cursor,
          { x: 0, y: -40, opacity: 0, scale: 0.7 },
          { x: 0, y: 0, opacity: 1, scale: 1, duration: ENTRY_DUR, ease: 'power2.out' },
          ENTRY_AT,
        );

        // Click-into-field tap — quick cursor press.
        const TAP_AT = ENTRY_AT + ENTRY_DUR;
        tl.to(cursor, { scale: 0.85, duration: 0.06, ease: 'power2.in', yoyo: true, repeat: 1 }, TAP_AT);

        // Typing the idea — smooth character-slice (continuous typewriter).
        const IDEA_TEXT = 'morning routine';
        const TYPE_START = 0.38;
        const TYPE_DUR = 0.9;
        const typeState = { len: 0 };
        tl.to(
          typeState,
          {
            len: IDEA_TEXT.length,
            duration: TYPE_DUR,
            ease: 'power1.inOut',
            onUpdate: () => {
              searchTextEl.textContent = IDEA_TEXT.substring(0, Math.floor(typeState.len));
            },
          },
          TYPE_START,
        );

        // Caret blink — deterministic sin, suppressed (solid) while typing,
        // starts blinking once typing settles. sin(0)=0 handled via opacity=1 default.
        const BLINK_START = TYPE_START + TYPE_DUR; // 1.28
        const BLINK_DUR = DURATION - BLINK_START;
        const BLINK_CYCLES = Math.max(1, Math.round(BLINK_DUR / 0.7));
        const blink = { p: 0 };
        tl.to(
          blink,
          {
            p: Math.PI * 2 * BLINK_CYCLES,
            duration: BLINK_DUR,
            ease: 'none',
            onUpdate: () => {
              searchCursorEl.style.opacity = Math.sin(blink.p) > 0 ? '1' : '0';
            },
          },
          BLINK_START,
        );

        /* ---------------------------------------------------------------
         * Scene 2 (1.3 - 2.8s): trending pills spring in, staggered, each
         * with a counting search-volume figure. Camera pushes in to chase.
         * ------------------------------------------------------------- */
        tl.fromTo(
          trendingEyebrow,
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.35, ease: 'power3.out' },
          1.30,
        );

        const PILL_STAGGER = 0.1;
        const POP_DUR = 0.5;
        const PILL_GROUP_START = 1.32;
        const PILL_TARGETS = [12.4, 8.7, 6.2, 4.1];
        const COUNT_START_OFFSET = 0.25;
        const COUNT_DUR = 0.5;

        for (let i = 0; i < 4; i++) {
          const popAt = PILL_GROUP_START + i * PILL_STAGGER;
          tl.fromTo(
            pillEls[i],
            { scale: 0, opacity: 0, y: 20 },
            { scale: 1, opacity: 1, y: 0, duration: POP_DUR, ease: 'power3.out' },
            popAt,
          );

          const numEl = document.getElementById(`ds3-num-${i}`);
          const countState = { v: 0, size: 20 };
          tl.to(
            countState,
            {
              v: PILL_TARGETS[i],
              size: 32,
              duration: COUNT_DUR,
              ease: 'power3.out',
              onUpdate: () => {
                numEl.textContent = countState.v.toFixed(1);
                numEl.style.fontSize = `${countState.size}px`;
              },
            },
            popAt + COUNT_START_OFFSET,
          );
        }

        // Camera Phase 2 — push in + pan toward the pills column.
        // Pills column center is measured relative to stage center (960, 540);
        // hand-authored layout gives a fixed, known offset (see layout constants).
        const PILLS_OFFSET_X = 308; // pills-col center x (1268) - stage center x (960)
        const PILLS_OFFSET_Y = -75; // pills-col center y (465) - stage center y (540)
        const PHASE2_SCALE = 1.06;
        const PHASE2_BIAS = 0.35;
        tl.to(
          cam,
          {
            scale: PHASE2_SCALE,
            x: -PILLS_OFFSET_X * PHASE2_SCALE * PHASE2_BIAS,
            y: -PILLS_OFFSET_Y * PHASE2_SCALE * PHASE2_BIAS,
            duration: 0.9,
            ease: 'power2.inOut',
            onUpdate: applyCamera,
          },
          1.35,
        );

        /* ---------------------------------------------------------------
         * Scene 3 (2.8 - 4.651s): cursor clicks the top pill, surface
         * swaps to the script panel, lines type on, camera settles + holds.
         * ------------------------------------------------------------- */
        // Cursor move to the top pill (pill-0 center, stage-absolute delta
        // from the cursor's CSS-laid default position at the search field).
        const MOVE_START = 2.78;
        const MOVE_DUR = 0.27;
        const CURSOR_DX = 744; // pill-0 center x (1268) - search box center x (524)
        const CURSOR_DY = -96; // pill-0 center y (252) - search box center y (348)
        tl.to(cursor, { x: CURSOR_DX, y: CURSOR_DY, duration: MOVE_DUR, ease: 'power2.inOut' }, MOVE_START);

        const CLICK_AT = MOVE_START + MOVE_DUR; // 3.05
        const PRESS_DUR = 0.08;
        tl.to(cursor, { scale: 0.85, duration: PRESS_DUR, ease: 'power2.in', yoyo: true, repeat: 1 }, CLICK_AT);
        tl.to(pillEls[0], { scale: 0.95, duration: PRESS_DUR, ease: 'power2.in', yoyo: true, repeat: 1 }, CLICK_AT);

        // Ripple — single ring from the click point, centered via xPercent/yPercent
        // baked into the fromTo (avoids a competing CSS transform baseline).
        const RIPPLE_AT = CLICK_AT;
        const RIPPLE_DUR = 0.5;
        tl.fromTo(
          ripple,
          { xPercent: -50, yPercent: -50, scale: 0, opacity: 1 },
          { xPercent: -50, yPercent: -50, scale: 4, opacity: 0, duration: RIPPLE_DUR, ease: 'power2.out' },
          RIPPLE_AT,
        );

        // Scale-swap: pills-col (outgoing) -> script-panel (incoming).
        const SWAP_TRIGGER = 3.15;
        const EXIT_DUR = 0.35;
        const ENTER_DUR = 0.5;
        const OVERLAP = 0.15;
        const EXIT_SCALE = 0.7;
        const BOUNCE_FACTOR = 1.6;

        tl.to(
          pillsCol,
          { scale: EXIT_SCALE, opacity: 0, duration: EXIT_DUR, ease: 'power2.in' },
          SWAP_TRIGGER,
        );
        tl.fromTo(
          scriptPanel,
          { scale: EXIT_SCALE, opacity: 0 },
          { scale: 1, opacity: 1, duration: ENTER_DUR, ease: `back.out(${BOUNCE_FACTOR})` },
          SWAP_TRIGGER + EXIT_DUR - OVERLAP,
        );

        // Camera Phase 3 — push further, re-centered on the same swap-wrap
        // footprint (script panel occupies the identical slot as the pills).
        const PHASE3_SCALE = 1.12;
        const PHASE3_BIAS = 0.55;
        const PHASE3_X = -PILLS_OFFSET_X * PHASE3_SCALE * PHASE3_BIAS;
        const PHASE3_Y = -PILLS_OFFSET_Y * PHASE3_SCALE * PHASE3_BIAS;
        tl.to(
          cam,
          {
            scale: PHASE3_SCALE,
            x: PHASE3_X,
            y: PHASE3_Y,
            duration: 0.5,
            ease: 'power3.out',
            onUpdate: applyCamera,
          },
          3.40,
        );

        // Script lines type on, one by one (quick flourish — smooth character-slice).
        const SCRIPT_LINES = ['Skip the snooze', 'Sunrise timelapse', 'Start strong'];
        const LINE_STARTS = [3.90, 4.10, 4.29];
        const LINE_DURS = [0.20, 0.19, 0.15];
        SCRIPT_LINES.forEach((text, i) => {
          const el = document.getElementById(`ds3-line-${i}`);
          const state = { len: 0 };
          tl.to(
            state,
            {
              len: text.length,
              duration: LINE_DURS[i],
              ease: 'power1.inOut',
              onUpdate: () => {
                el.textContent = text.substring(0, Math.floor(state.len));
              },
            },
            LINE_STARTS[i],
          );
        });

        // Final hold — subtle jitter only (sine-wave-loop, low amplitude).
        // sin(0)=0 so the transform equals the resting Phase-3 camera exactly
        // at JITTER_START — no visible jump.
        const JITTER_START = 4.30;
        const JITTER_DUR = DURATION - JITTER_START;
        const jitter = { p: 0 };
        tl.to(
          jitter,
          {
            p: Math.PI * 2 * 1,
            duration: JITTER_DUR,
            ease: 'none',
            onUpdate: () => {
              const sJit = Math.sin(jitter.p) * 0.008;
              const yJit = Math.sin(jitter.p) * 2;
              camera.style.transform = `translate(${PHASE3_X}px, ${PHASE3_Y + yJit}px) scale(${PHASE3_SCALE + sJit})`;
            },
          },
          JITTER_START,
        );

        window.__timelines['03-demo-script'] = tl;
      </script>
