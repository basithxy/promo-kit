<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <!-- head is metadata for the source file only; the runtime discards everything
         outside <template> — styles/scripts live inside it below. -->
  </head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&display=swap');

        /* Root: styled by #root, never a class — see hyperframes-core Pitfall 3. */
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          container-type: size;
          font-family: 'Mulish', sans-serif;
        }

        /* Full-bleed ground lives on a dedicated class="clip" layer, never on #root
           itself (root fill can be dropped by the compositor — hyperframes-core). */
        .intro-bg {
          position: absolute;
          inset: 0;
          background: #FFFFFF;
        }

        .intro-canvas {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          display: block;
          opacity: 0;
          will-change: opacity;
        }

        .intro-stage {
          position: absolute;
          inset: 0;
          z-index: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          padding-top: 29cqh;
        }

        .intro-lockup {
          display: flex;
          flex-direction: column;
          align-items: center;
          will-change: transform;
        }

        .intro-wordmark {
          display: block;
          font-family: 'Mulish', sans-serif;
          font-weight: 800;
          font-size: 9cqw;
          line-height: 1;
          letter-spacing: -0.02em;
          color: #000000;
          opacity: 0;
        }

        .intro-promise {
          display: block;
          margin-top: 3.4cqh;
          width: 66cqw;
          text-align: center;
          font-family: 'Mulish', sans-serif;
          font-weight: 600;
          font-size: 3cqw;
          line-height: 1.25;
          letter-spacing: -0.005em;
          color: #000000;
          white-space: nowrap;
        }

        .intro-caret {
          display: inline-block;
          color: #6638D9;
          opacity: 0;
        }

        .intro-final-wrap {
          position: relative;
          display: inline-block;
          margin-left: 0.32em;
        }

        .intro-final {
          position: relative;
          display: inline-block;
          z-index: 1;
          color: #000000;
          opacity: 0;
        }

        .intro-underline {
          position: absolute;
          left: 0;
          right: 0;
          bottom: -0.62cqh;
          height: 0.42cqh;
          min-height: 3px;
          border-radius: 2px;
          background: #6638D9;
          transform-origin: 0% 50%;
        }
      </style>

      <div data-hf-id="hf-38bn" id="root" data-composition-id="02-intro" data-width="1920" data-height="1080" data-duration="4.212">
        <!-- Track 0: full-bleed ground + drifting Three.js gradient-mesh field -->
        <div data-hf-id="hf-2mu7" class="intro-bg clip" id="intro-bg" data-start="0" data-duration="3.712" data-track-index="0">
          <canvas data-hf-id="hf-jz77" class="intro-canvas" id="intro-canvas"></canvas>
        </div>

        <!-- Track 1: the type lockup (wordmark + typed promise line) -->
        <div data-hf-id="hf-d4x6" class="intro-stage clip" id="intro-stage" data-start="0" data-duration="3.712" data-track-index="1">
          <div data-hf-id="hf-g3gi" class="intro-lockup" id="intro-lockup">
            <div data-hf-id="hf-ztw0" class="intro-wordmark" id="intro-wordmark">Syllaby</div>
            <div data-hf-id="hf-pab6" class="intro-promise" id="intro-promise">
              <span data-hf-id="hf-injj" id="intro-typed"></span><span data-hf-id="hf-g1rp" class="intro-caret" id="intro-caret">|</span><span data-hf-id="hf-apur" class="intro-final-wrap" id="intro-final-wrap"><span data-hf-id="hf-bcad" class="intro-final" id="intro-final">Instantly.</span><span data-hf-id="hf-4ytx" class="intro-underline" id="intro-underline"></span></span>
            </div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const TOTAL_DURATION = 3.712;

        // ---------------------------------------------------------------
        // Depth layer — slow-drifting Three.js/WebGL gradient-mesh field,
        // `primary` (#6638D9) tinted, low opacity, behind the type. Purely
        // deterministic: every value below is a function of elapsed
        // timeline seconds, never wall-clock (`Date.now`/`performance.now`
        // are never read) and there is no `Math.random` anywhere — the
        // wobble comes from fixed-frequency sine/cosine terms only.
        // ---------------------------------------------------------------
        const canvas = document.getElementById('intro-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(1920, 1080, false);
        renderer.setPixelRatio(1);
        renderer.setClearColor(0x000000, 0);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(32, 1920 / 1080, 0.1, 50);
        camera.position.set(0, 0, 8);
        camera.lookAt(0, 0, 0);

        const SEG_X = 44;
        const SEG_Y = 26;
        const geometry = new THREE.PlaneGeometry(17, 10.5, SEG_X, SEG_Y);
        const position = geometry.attributes.position;
        const vertexCount = position.count;
        const colorAttr = new Float32Array(vertexCount * 3);
        geometry.setAttribute('color', new THREE.BufferAttribute(colorAttr, 3));

        const colorLow = new THREE.Color(0xffffff);
        const colorHigh = new THREE.Color(0x6638d9);
        const mixed = new THREE.Color();

        const material = new THREE.MeshBasicMaterial({
          vertexColors: true,
          transparent: true,
          opacity: 0.5,
          depthWrite: false,
        });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function renderGradientAt(elapsed) {
          for (let i = 0; i < vertexCount; i++) {
            const x = position.getX(i);
            const y = position.getY(i);
            const wave =
              Math.sin(x * 0.35 + elapsed * 0.32) * 0.55 +
              Math.cos(y * 0.42 - elapsed * 0.24) * 0.45 +
              Math.sin((x + y) * 0.2 + elapsed * 0.16) * 0.35;
            position.setZ(i, wave * 0.55);
            const t = Math.min(1, Math.max(0, (wave + 1.35) / 2.7));
            mixed.copy(colorLow).lerp(colorHigh, t);
            colorAttr[i * 3] = mixed.r;
            colorAttr[i * 3 + 1] = mixed.g;
            colorAttr[i * 3 + 2] = mixed.b;
          }
          position.needsUpdate = true;
          geometry.attributes.color.needsUpdate = true;

          camera.position.x = Math.sin(elapsed * 0.11) * 0.5;
          camera.position.y = Math.cos(elapsed * 0.08) * 0.32;
          camera.lookAt(0, 0, 0);
          mesh.rotation.z = Math.sin(elapsed * 0.05) * 0.02;

          renderer.render(scene, camera);
        }

        renderGradientAt(0);

        // ---------------------------------------------------------------
        // Timeline — one paused GSAP timeline drives every phase, incl.
        // the gradient-mesh field (via the driver tween's onUpdate below).
        // ---------------------------------------------------------------
        const tl = gsap.timeline({ paused: true });

        const wordmarkEl = document.getElementById('intro-wordmark');
        const typedEl = document.getElementById('intro-typed');
        const caretEl = document.getElementById('intro-caret');
        const finalEl = document.getElementById('intro-final');
        const underlineEl = document.getElementById('intro-underline');
        const lockupEl = document.getElementById('intro-lockup');

        // Scene 1 (0.0–1.1s) — canvas crossfades in from flat white as the
        // gradient-mesh field appears; "Syllaby" wordmark hard-cut FLASHES
        // dead-center (no fade/slide — an instant state swap, matching
        // discrete-text-sequence's hard-cut mechanic).
        tl.fromTo(canvas, { opacity: 0 }, { opacity: 0.5, duration: 0.9, ease: 'power1.out' }, 0);

        const gradientDriver = { t: 0 };
        tl.to(
          gradientDriver,
          {
            t: TOTAL_DURATION,
            duration: TOTAL_DURATION,
            ease: 'none',
            onUpdate: () => renderGradientAt(gradientDriver.t),
          },
          0,
        );

        const WORDMARK_AT = 0.12;
        tl.fromTo(wordmarkEl, { opacity: 0 }, { opacity: 1, duration: 0.02 }, WORDMARK_AT);

        // Scene 2 (1.1–2.5s) — as the VO says "turn any idea into a finished
        // video," a short typed promise line builds beneath the wordmark
        // (smooth character-slice typewriter — discrete-text-sequence's
        // continuous variation) with a trailing blinking caret.
        const TYPED_TEXT = 'Idea in. Video out.';
        const TYPE_START = 1.12;
        const TYPE_DUR = 1.28;
        const TYPE_END = TYPE_START + TYPE_DUR; // 2.40

        const typeLen = { v: 0 };
        tl.to(
          typeLen,
          {
            v: TYPED_TEXT.length,
            duration: TYPE_DUR,
            ease: 'power1.inOut',
            onUpdate: () => {
              typedEl.textContent = TYPED_TEXT.substring(0, Math.floor(typeLen.v));
            },
          },
          TYPE_START,
        );

        // Caret blink — sin-driven, deterministic (not a CSS animation).
        const BLINK_CYCLES = 2;
        const blinkPhase = { p: 0 };
        tl.to(
          blinkPhase,
          {
            p: Math.PI * 2 * BLINK_CYCLES,
            duration: TYPE_DUR,
            ease: 'none',
            onUpdate: () => {
              caretEl.style.opacity = Math.sin(blinkPhase.p) >= 0 ? '1' : '0';
            },
          },
          TYPE_START,
        );
        // Hard-hide the caret once typing is done, just ahead of the final
        // word's own entrance (discrete state swap, not an interpolation).
        tl.set(caretEl, { opacity: 0 }, TYPE_END + 0.02);

        // Scene 3 (2.5–3.712s) — "instantly" lands: the final word pops in
        // on its own beat (spring-pop-entrance, quick firm settle) exactly
        // as the VO says it, then gets a primary-color underline sweep
        // (css-marker-patterns' highlight-sweep mechanic) as the
        // punctuation snap. The whole lockup then settles into a subtle
        // jitter hold (sine-wave-loop, low end of its amplitude range) —
        // the deliberate breather per the video direction — while the
        // gradient field keeps its slow drift underneath.
        const FINAL_AT = 2.5;
        tl.fromTo(
          finalEl,
          { opacity: 0, scale: 0.85 },
          { opacity: 1, scale: 1, duration: 0.22, ease: 'power3.out' },
          FINAL_AT,
        );

        const UNDERLINE_AT = FINAL_AT + 0.22; // 2.72
        tl.fromTo(
          underlineEl,
          { scaleX: 0 },
          { scaleX: 1, duration: 0.42, ease: 'power2.out' },
          UNDERLINE_AT,
        );

        const JITTER_START = UNDERLINE_AT + 0.42; // 3.14
        const JITTER_DUR = TOTAL_DURATION - JITTER_START; // ~0.572s
        const JITTER_CYCLES = 0.6;
        const SCALE_AMP = 0.008;
        const Y_AMP_PX = 2;
        const jitterPhase = { p: 0 };
        tl.to(
          jitterPhase,
          {
            p: Math.PI * 2 * JITTER_CYCLES,
            duration: JITTER_DUR,
            ease: 'none',
            onUpdate: () => {
              const jitterScale = 1 + Math.sin(jitterPhase.p) * SCALE_AMP;
              const jitterY = Math.sin(jitterPhase.p) * Y_AMP_PX;
              lockupEl.style.transform = `translateY(${jitterY}px) scale(${jitterScale})`;
            },
          },
          JITTER_START,
        );

        window.__timelines['02-intro'] = tl;
      </script>
    </template>
  </body>
</html>
