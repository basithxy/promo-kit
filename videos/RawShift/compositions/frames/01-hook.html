<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "__Inter_f367f3";
          font-weight: 100 900;
          font-style: normal;
          font-display: block;
          src: url("assets/fonts/Interf367f3-Regular.woff2") format("woff2");
        }

        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "__Inter_f367f3", sans-serif;
        }

        .ground {
          position: absolute;
          inset: 0;
          background: #0b0b12;
        }

        .blob {
          position: absolute;
          border-radius: 50%;
          filter: blur(90px);
          will-change: transform;
        }
        .blob-a {
          width: 900px;
          height: 900px;
          left: -250px;
          top: -200px;
          background: radial-gradient(circle, rgba(79, 70, 229, 0.5) 0%, rgba(79, 70, 229, 0) 70%);
        }
        .blob-b {
          width: 780px;
          height: 780px;
          right: -220px;
          bottom: -260px;
          background: radial-gradient(circle, rgba(129, 140, 248, 0.4) 0%, rgba(129, 140, 248, 0) 70%);
        }
        .blob-c {
          width: 560px;
          height: 560px;
          left: 55%;
          top: 55%;
          background: radial-gradient(circle, rgba(79, 70, 229, 0.28) 0%, rgba(79, 70, 229, 0) 70%);
        }

        .stage {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 8px;
          padding: 0 160px;
        }

        .line {
          font-weight: 700;
          font-size: 92px;
          line-height: 1.16;
          letter-spacing: -0.02em;
          color: #f5f5f8;
          text-align: center;
          will-change: transform, opacity;
        }

        .line-2 {
          display: inline-flex;
          gap: 0.28em;
        }

        .word {
          display: inline-block;
          will-change: transform, opacity;
        }

        .underline-wrap {
          position: relative;
          display: inline-block;
        }
        .underline {
          position: absolute;
          left: 0;
          bottom: -10px;
          height: 6px;
          width: 100%;
          background: #4f46e5;
          border-radius: 3px;
          transform: scaleX(0);
          transform-origin: 0% 50%;
          will-change: transform;
        }
      </style>

      <div id="root" data-composition-id="01-hook" data-width="1920" data-height="1080">
        <div id="ground" class="ground clip" data-start="0" data-duration="2.944" data-track-index="0"></div>

        <div id="ambient-wrap" class="clip" data-start="0" data-duration="2.944" data-track-index="1">
          <div class="blob blob-a" id="blob-a"></div>
          <div class="blob blob-b" id="blob-b"></div>
          <div class="blob blob-c" id="blob-c"></div>
        </div>

        <div id="stage" class="stage clip" data-start="0" data-duration="2.944" data-track-index="2">
          <div class="line" id="line1">Still uploading your files</div>
          <div class="line line-2" id="line2">
            <span class="underline-wrap">
              <span class="word">just</span>
            </span>
            <span class="word">to</span>
            <span class="underline-wrap">
              <span class="word">convert</span>
              <span class="underline" id="underline"></span>
            </span>
            <span class="word">them?</span>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Scene 1 (0.0-1.4s): hard-cut flash-in of the first phrase, dead center.
        tl.fromTo(
          "#line1",
          { opacity: 0, scale: 0.97 },
          { opacity: 1, scale: 1, duration: 0.14, ease: "power1.out" },
          0.0,
        );

        // Scene 2 (1.4-2.944s): second phrase per-word staggered reveal, timed to VO.
        const words2 = gsap.utils.toArray("#line2 .word");
        words2.forEach((el, i) => {
          tl.fromTo(
            el,
            { opacity: 0, y: 22 },
            { opacity: 1, y: 0, duration: 0.42, ease: "power3.out" },
            1.4 + i * 0.14,
          );
        });
        // Underline draws under "convert" as the VO lands on it.
        tl.fromTo(
          "#underline",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.34, ease: "power2.out" },
          1.4 + 2 * 0.14 + 0.1,
        );

        // Ambient drift — deterministic sine, low amplitude, runs the whole frame.
        const drift = { p: 0 };
        tl.to(
          drift,
          {
            p: Math.PI * 2,
            duration: 2.944,
            ease: "none",
            onUpdate: () => {
              const a = document.getElementById("blob-a");
              const b = document.getElementById("blob-b");
              const c = document.getElementById("blob-c");
              a.style.transform = `translate(${Math.sin(drift.p) * 26}px, ${Math.cos(drift.p * 0.8) * 18}px)`;
              b.style.transform = `translate(${Math.sin(drift.p + Math.PI) * 22}px, ${Math.cos(drift.p * 0.7 + 1) * 16}px)`;
              c.style.transform = `translate(${Math.sin(drift.p * 0.6 + 2) * 20}px, ${Math.cos(drift.p * 0.9) * 14}px)`;
            },
          },
          0,
        );

        window.__timelines["01-hook"] = tl;
      </script>
    </template>
  </body>
</html>
