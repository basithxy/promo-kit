<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "__Inter_f367f3";
          font-weight: 100 900;
          font-style: normal;
          font-display: block;
          src: url("assets/fonts/Interf367f3-Regular.woff2") format("woff2");
        }

        #root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "__Inter_f367f3", sans-serif;
        }

        .ground {
          position: absolute;
          inset: 0;
          background: #ffffff;
        }

        .blob {
          position: absolute;
          border-radius: 50%;
          filter: blur(110px);
          will-change: transform;
        }
        .blob-a {
          width: 900px;
          height: 900px;
          left: -260px;
          top: -240px;
          background: radial-gradient(circle, rgba(79, 70, 229, 0.09) 0%, rgba(79, 70, 229, 0) 70%);
        }
        .blob-b {
          width: 820px;
          height: 820px;
          right: -260px;
          bottom: -260px;
          background: radial-gradient(circle, rgba(129, 140, 248, 0.08) 0%, rgba(129, 140, 248, 0) 70%);
        }

        .gem-wrap {
          position: absolute;
          right: 220px;
          top: 210px;
          perspective: 900px;
          opacity: 0;
          will-change: opacity;
        }
        .gem {
          position: relative;
          width: 120px;
          height: 120px;
          transform-style: preserve-3d;
          will-change: transform;
        }
        .gem-face {
          position: absolute;
          inset: 0;
          border-radius: 26px;
          background: linear-gradient(135deg, #4f46e5 0%, #818cf8 100%);
        }
        .gem-face.back {
          background: linear-gradient(135deg, #818cf8 0%, #4f46e5 100%);
          transform: rotateY(180deg) translateZ(0);
          opacity: 0.55;
        }
        .gem-face.edge {
          width: 120px;
          height: 120px;
          background: rgba(79, 70, 229, 0.35);
          transform: rotateY(90deg) translateZ(0);
        }

        .stage {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 26px;
        }

        .eyebrow-wrap {
          display: inline-flex;
          flex-direction: column;
          align-items: center;
          gap: 10px;
        }
        .eyebrow {
          font-size: 30px;
          font-weight: 600;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: #4f46e5;
          will-change: transform, opacity;
        }
        .eyebrow-underline {
          width: 60px;
          height: 4px;
          border-radius: 2px;
          background: #4f46e5;
          transform: scaleX(0);
          transform-origin: 50% 50%;
          will-change: transform;
        }

        .wordmark {
          font-size: 168px;
          font-weight: 700;
          letter-spacing: -0.02em;
          line-height: 1;
          white-space: nowrap;
        }
        .wm-raw {
          color: #111827;
        }
        .wm-shift {
          background: linear-gradient(120deg, #4f46e5 0%, #818cf8 100%);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }
        .wm-part {
          display: inline-block;
          will-change: transform, opacity;
        }

        .pills {
          display: flex;
          gap: 16px;
          margin-top: 6px;
        }
        .pill {
          padding: 10px 22px;
          border-radius: 100px;
          background: rgba(79, 70, 229, 0.08);
          color: #4f46e5;
          font-size: 24px;
          font-weight: 500;
          will-change: transform, opacity;
        }

        .promise {
          margin-top: 8px;
          font-size: 34px;
          font-weight: 400;
          color: #6b6b6b;
          opacity: 0;
        }
      </style>

      <div id="root" data-composition-id="02-product-intro" data-width="1920" data-height="1080" data-duration="6.217">
        <div id="ground" class="ground clip" data-start="0" data-duration="5.717" data-track-index="0"></div>

        <div id="ambient-wrap" class="clip" data-start="0" data-duration="5.717" data-track-index="1">
          <div class="blob blob-a" id="blob-a"></div>
          <div class="blob blob-b" id="blob-b"></div>
        </div>

        <div class="gem-wrap clip" id="gem-wrap" data-start="0" data-duration="5.717" data-track-index="2">
          <div class="gem" id="gem">
            <div class="gem-face"></div>
            <div class="gem-face back"></div>
            <div class="gem-face edge"></div>
          </div>
        </div>

        <div id="stage" class="stage clip" data-start="0" data-duration="5.717" data-track-index="3">
          <div class="eyebrow-wrap">
            <div class="eyebrow" id="eyebrow">Introducing</div>
            <div class="eyebrow-underline" id="eyebrow-underline"></div>
          </div>

          <div class="wordmark" id="wordmark">
            <span class="wm-part wm-raw" id="wm-raw">Raw</span><span class="wm-part wm-shift" id="wm-shift">Shift</span>
          </div>

          <div class="pills" id="pills">
            <div class="pill">Convert</div>
            <div class="pill">Compress</div>
            <div class="pill">Split</div>
            <div class="pill">Merge</div>
          </div>

          <div class="promise" id="promise">entirely in your browser.</div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Ambient blob drift + the floating/rotating gem motif — deterministic sine, runs the whole frame.
        tl.fromTo("#gem-wrap", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.3);
        const drift = { p: 0 };
        tl.to(
          drift,
          {
            p: Math.PI * 2,
            duration: 5.717,
            ease: "none",
            onUpdate: () => {
              const a = document.getElementById("blob-a");
              const b = document.getElementById("blob-b");
              const gem = document.getElementById("gem");
              a.style.transform = `translate(${Math.sin(drift.p) * 24}px, ${Math.cos(drift.p * 0.8) * 16}px)`;
              b.style.transform = `translate(${Math.sin(drift.p + Math.PI) * 20}px, ${Math.cos(drift.p * 0.7 + 1) * 14}px)`;
              const rotY = drift.p * 0.7 * (180 / Math.PI);
              const rotX = Math.sin(drift.p * 0.6) * 10;
              const bob = Math.sin(drift.p * 0.5) * 10;
              gem.style.transform = `translateY(${bob}px) rotateY(${rotY}deg) rotateX(${rotX}deg)`;
            },
          },
          0,
        );

        // Scene 1 (0.0-1.2s): eyebrow flashes in with drawn underline.
        tl.fromTo("#eyebrow", { opacity: 0, y: -14 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.15);
        tl.fromTo(
          "#eyebrow-underline",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.35, ease: "power2.out" },
          0.55,
        );

        // Scene 2 (1.2-2.6s): wordmark builds — Raw then Shift, smooth long-tail settle.
        tl.fromTo("#wm-raw", { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.5, ease: "power3.out" }, 1.2);
        tl.fromTo(
          "#wm-shift",
          { opacity: 0, scale: 0.85 },
          { opacity: 1, scale: 1, duration: 0.55, ease: "power3.out" },
          1.45,
        );

        // Scene 3 (2.6-4.6s): four tag pills stagger in, one per named word.
        const pills = gsap.utils.toArray("#pills .pill");
        pills.forEach((el, i) => {
          tl.fromTo(
            el,
            { opacity: 0, y: 18, scale: 0.9 },
            { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "power3.out" },
            2.6 + i * 0.42,
          );
        });

        // Scene 4 (4.6-5.717s): promise line settles beneath, holds to the end.
        tl.fromTo(
          "#promise",
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" },
          4.6,
        );

        window.__timelines["02-product-intro"] = tl;
      </script>
    </template>
  </body>
</html>
