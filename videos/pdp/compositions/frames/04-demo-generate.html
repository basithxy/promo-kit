      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          var tl = gsap.timeline({ paused: true });

          var TOTAL = 4.16;

          // ---------- Coordinates (composition space, camera wrapper is inset:0) ----------
          // Generate button center, measured from the app-window (260,190) + win-body (48,96)
          // offset + form-footer flex end position. Precomputed to avoid layout reads at
          // script-eval time (getBoundingClientRect is unsafe before mount).
          var BTN_CENTER = { x: 996, y: 776 };
          // Selected swatch ring center (continuation point from Frame 3's last click):
          // panel-form left 308 + thumb 168 + gap 28 = swatch-block left 504; first swatch
          // (the ring) center = 504 + 33 (half of 66px ring). Row top 400 + label block 28
          // + half ring 33 = 461.
          var SWATCH_CENTER = { x: 537, y: 461 };

          // ================= Scene 1 (0.0 - 1.0s): press "Generate" =================
          gsap.set("#cursor", { x: SWATCH_CENTER.x, y: SWATCH_CENTER.y, opacity: 1 });

          var APPROACH_START = 0.05;
          var APPROACH_DUR = 0.55; // arrives at 0.60
          var PRESS_DOWN_AT = APPROACH_START + APPROACH_DUR; // 0.60
          var PRESS_DOWN_DUR = 0.15;
          var RELEASE_AT = PRESS_DOWN_AT + PRESS_DOWN_DUR; // 0.75
          var RELEASE_DUR = 0.25; // settles at 1.00

          tl.to(
            "#cursor",
            { x: BTN_CENTER.x, y: BTN_CENTER.y, duration: APPROACH_DUR, ease: "power2.inOut" },
            APPROACH_START
          );

          tl.to(
            ["#btn-generate", "#cursor"],
            { scale: 0.9, duration: PRESS_DOWN_DUR, ease: "power1.in" },
            PRESS_DOWN_AT
          );

          tl.to(
            ["#btn-generate", "#cursor"],
            { scale: 1, duration: RELEASE_DUR, ease: "back.out(1.8)" },
            RELEASE_AT
          );

          tl.to(
            "#btn-generate",
            { boxShadow: "0 0 0 14px rgba(5,101,245,0.16)", duration: PRESS_DOWN_DUR, ease: "power1.in" },
            PRESS_DOWN_AT
          );
          tl.to(
            "#btn-generate",
            { boxShadow: "0 0 0 0 rgba(5,101,245,0)", duration: RELEASE_DUR + 0.2, ease: "power2.out" },
            RELEASE_AT
          );

          // ================= Seam A -> B (t = 1.0s): scale-swap-transition =================
          var TRIGGER = 1.0;
          var EXIT_DUR = 0.35;
          var EXIT_SCALE = 0.85;
          var OVERLAP = 0.15;
          var ENTER_DUR = 0.55;

          tl.to(
            "#state-form",
            { scale: EXIT_SCALE, opacity: 0, duration: EXIT_DUR, ease: "power2.in" },
            TRIGGER
          );
          tl.to("#cursor", { opacity: 0, duration: 0.3, ease: "power2.out" }, TRIGGER);

          tl.to(
            "#state-generate",
            { scale: 1, opacity: 1, duration: ENTER_DUR, ease: "back.out(1.6)" },
            TRIGGER + EXIT_DUR - OVERLAP // = 1.20
          );

          // ================= Scene 2 (1.0 - 2.8s): tab stepping =================
          // Discrete-threshold state stepping (discrete-text-sequence mechanism, applied to
          // a background-color/active state instead of text) synced to "brochure, exposé, or
          // fact sheet" landing left to right, one at a time.
          var TAB_SEQUENCE = [
            { t: 1.9, active: 0 },
            { t: 2.2, active: 1 },
            { t: 2.5, active: 2 }
          ];
          var tabEls = [
            document.getElementById("tab-0"),
            document.getElementById("tab-1"),
            document.getElementById("tab-2")
          ];

          function activeTabAt(time) {
            var a = -1;
            for (var i = 0; i < TAB_SEQUENCE.length; i++) {
              if (time >= TAB_SEQUENCE[i].t) a = TAB_SEQUENCE[i].active;
            }
            return a;
          }

          function applyTabState(time) {
            var active = activeTabAt(time);
            for (var i = 0; i < tabEls.length; i++) {
              if (i === active) {
                tabEls[i].style.background = "#0565F5";
                tabEls[i].style.borderColor = "#0565F5";
                tabEls[i].style.color = "#ffffff";
              } else {
                tabEls[i].style.background = "rgba(5, 101, 245, 0.04)";
                tabEls[i].style.borderColor = "rgba(5, 101, 245, 0.2)";
                tabEls[i].style.color = "#141414";
              }
            }
          }

          var tabDriver = { t: 0 };
          tl.to(
            tabDriver,
            {
              t: TOTAL,
              duration: TOTAL,
              ease: "none",
              onUpdate: function () {
                applyTabState(tabDriver.t);
              }
            },
            0
          );

          // ================= Scene 3 (2.8 - 4.16s): progress fill + document assembly =================
          tl.to("#progress-fill", { scaleX: 1, duration: 1.0, ease: "power2.out" }, 2.8);

          var items = document.querySelectorAll(".assembly-item");
          var EXPAND_DUR = 0.7;
          var STAGGER = 0.08;
          var ENTRY_AT = 2.9;

          items.forEach(function (el, i) {
            var targetX = Number(el.dataset.targetX);
            var targetY = Number(el.dataset.targetY);
            tl.fromTo(
              el,
              { xPercent: -50, yPercent: -50, x: 0, y: 0, scale: 0.6, opacity: 0 },
              {
                x: targetX,
                y: targetY,
                scale: 1,
                opacity: 1,
                duration: EXPAND_DUR,
                ease: "power3.out"
              },
              ENTRY_AT + i * STAGGER
            );
          });

          // Subtle continuous push-in across the FULL duration (not isolated to the back half).
          var cam = { scale: 1 };
          tl.to(
            cam,
            {
              scale: 1.035,
              duration: TOTAL,
              ease: "none",
              onUpdate: function () {
                document.getElementById("camera").style.transform = "scale(" + cam.scale + ")";
              }
            },
            0
          );

          window.__timelines["04-demo-generate"] = tl;
        })();
      </script>
    </template>
