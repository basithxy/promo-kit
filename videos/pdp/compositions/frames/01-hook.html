<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Nohemi";
          font-weight: 700;
          font-style: normal;
          font-display: block;
          src: url("assets/fonts/Nohemi-Bold.otf") format("opentype");
        }

        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          container-type: size;
          background: transparent;
          font-family: "Nohemi", sans-serif;
        }

        .bg-field {
          position: absolute;
          inset: 0;
          background: #ffffff;
        }

        .stage {
          position: absolute;
          inset: 0;
          display: grid;
          grid-template-columns: 1fr;
          grid-template-rows: 1fr;
          place-items: center;
          padding: 0 5cqw;
          box-sizing: border-box;
        }

        /* Grid-stacked (all three lines share cell 1/1) instead of
           position:absolute + transform:translate(-50%,-50%) — a static
           CSS `transform` on an element GSAP later tweens scale/y on would
           get silently overwritten by GSAP's own transform writes (the
           centering offset would drop and the line would jump). Grid
           centering needs no `transform` at all, so there's nothing for
           GSAP to collide with. */
        .line {
          grid-column: 1;
          grid-row: 1;
          text-align: center;
          font-weight: 700;
          letter-spacing: -0.02em;
          color: #141414;
          margin: 0;
          max-width: 78cqw;
        }

        #line1 {
          font-size: 6cqw;
          line-height: 1.1;
          opacity: 0;
        }

        #line2 {
          font-size: 5cqw;
          line-height: 1.15;
          opacity: 0;
          white-space: normal;
        }

        #line2 .word {
          display: inline-block;
          opacity: 0;
          position: relative;
        }

        #line2 .word + .word {
          margin-left: 0.28em;
        }

        #w4 {
          position: relative;
        }

        .underline-bar {
          position: absolute;
          left: 0;
          right: 0;
          bottom: -0.14em;
          height: 5px;
          border-radius: 2px;
          background: #0565f5;
          transform: scaleX(0);
          transform-origin: left center;
          display: block;
        }

        #line3 {
          font-size: 6cqw;
          line-height: 1.1;
          opacity: 0;
        }
      </style>

      <div id="root" data-composition-id="01-hook" data-width="1920" data-height="1080">
        <div class="clip bg-field" id="bg" data-start="0" data-duration="4.267" data-track-index="0"></div>
        <div class="clip stage" id="stage" data-start="0" data-duration="4.267" data-track-index="1">
          <div class="line" id="line1">Great property brochures</div>
          <div class="line" id="line2">
            <span class="word" id="w1">shouldn&rsquo;t</span>
            <span class="word" id="w2">cost</span>
            <span class="word" id="w3">a</span>
            <span class="word" id="w4">fortune &mdash;<span class="underline-bar" id="underline"></span></span>
          </div>
          <div class="line" id="line3">or take all week.</div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          var tl = gsap.timeline({ paused: true });

          var line1 = "#line1";
          var line2 = "#line2";
          var line3 = "#line3";
          var words = ["#w1", "#w2", "#w3", "#w4"];

          // ---- Scene 1 (0.0–1.4s): "Great property brochures" hard-cut flash ----
          tl.fromTo(
            line1,
            { opacity: 0, scale: 1.08, filter: "blur(0px)" },
            { opacity: 1, scale: 1, duration: 0.12, ease: "power4.out" },
            0.0,
          );
          // hold ~0.12–1.20, then blur/zoom off (prior beat exits toward viewer)
          tl.to(
            line1,
            { scale: 1.18, filter: "blur(10px)", duration: 0.2, ease: "power3.in" },
            1.2,
          );
          tl.to(line1, { opacity: 0.15, duration: 0.2, ease: "none" }, 1.2);
          // hard cut at the scene boundary
          tl.set(line1, { opacity: 0 }, 1.4);

          // ---- Scene 2 (1.4–2.8s): per-word staggered fade-in + underline ----
          tl.set(line2, { opacity: 1 }, 1.4);
          var wordStart = 1.4;
          var wordStagger = 0.09;
          words.forEach(function (sel, i) {
            var t = wordStart + i * wordStagger;
            tl.fromTo(
              sel,
              { opacity: 0, y: 14, filter: "blur(6px)" },
              { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.4, ease: "power4.out" },
              t,
            );
          });
          // underline draws left -> right beneath "fortune —"
          tl.to(
            "#underline",
            { scaleX: 1, duration: 0.3, ease: "power2.out" },
            2.1,
          );
          // hold ~2.4–2.6, then blur/zoom off the whole line as one group
          tl.to(
            line2,
            { scale: 1.18, filter: "blur(10px)", duration: 0.2, ease: "power3.in" },
            2.6,
          );
          tl.to(line2, { opacity: 0.15, duration: 0.2, ease: "none" }, 2.6);
          // hard cut at the scene boundary
          tl.set(line2, { opacity: 0 }, 2.8);

          // ---- Scene 3 (2.8–4.267s): final chunk hard-cuts in, power3 settle, holds ----
          tl.set(line3, { opacity: 1 }, 2.8);
          tl.fromTo(
            line3,
            { scale: 1.06, y: 8 },
            { scale: 1, y: 0, duration: 0.5, ease: "power3.out" },
            2.8,
          );
          // holds static to the end — no further motion, no exit (final beat of a
          // deliberate held/breather frame; the root transition owns the exit).

          window.__timelines["01-hook"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
